            **Available Version:** 63.0
          type: integer
        outputMaxRecordsPerFile:
          format: int64
          description: |
            Maximum number of records in the output file from `1` through `100000`.

            **Available Version:** 63.0
          type: integer
        predeterminedFilename:
          description: |
