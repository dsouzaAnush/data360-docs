      value:
        mlModel: llmgateway__OpenAIGPT4Omni_08_06
        files:
          - fileId: file-abc123456789
        schemaConfig:
          $schema: http://json-schema.org/draft-07/schema#
          title: AmazonInvoice
          description: A schema representing a standard Amazon retail invoice including tax details and line items.
          type: object
          required:
            - invoice_number
            - order_id
            - order_date
            - seller_details
            - billing_address
            - items
            - totals
          properties:
            invoice_number:
              type: string
              description: The unique legal identifier for the tax invoice.
            order_id:
              type: string
              pattern: ^\d{3}-\d{7}-\d{7}$
              description: The standard Amazon Order ID format (for example, 123-1234567-1234567).
            order_date:
              type: string
              format: date
              description: The date the order was placed.
            invoice_date:
              type: string
              format: date
              description: The date the invoice was generated.
            items:
              type: array
              minItems: 1
              items:
                type: object
                properties:
                  description:
                    type: string
                  unit_price:
                    type: number
                    minimum: 0
                  quantity:
                    type: integer
                    minimum: 1
                  tax_rate:
                    type: number
                    description: Percentage of tax applied (for example, 18.0).
                  tax_type:
                    type: string
                    enum:
                      - VAT
                      - GST
                      - Sales Tax
                  total_price:
                    type: number
                required:
                  - description
                  - unit_price
                  - quantity
                  - total_price
