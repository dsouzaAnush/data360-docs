          description: |
            Parameter type.

            **Filter Group:** Small

            **Available Version:** 61.0
          enum:
            - Continuous - a variable that can take on a value within a given range and is typically associated with measurements and quantities.
            - Discrete - a variable that can take on only a finite or countable number of distinct values. These parameters are used in regression models, where the outcome is categorical, for example, a success or failure.
          type: string
