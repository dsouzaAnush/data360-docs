            The generative model capabilities this parameter is applicable to.

            **Filter Group:** Small

            **Available Version:** 61.0
          type: array
          items:
            enum:
              - BinaryClassification
              - ChatCompletion
              - Completion
              - Embedding
              - Generic
              - MulticlassClassification
              - Regression
            type: string
        description:
          description: |
            Parameter description.

            **Filter Group:** Small

            **Available Version:** 61.0
          type: string
