tags:
  - name: Activation Targets
    description: |
      Connect REST API endpoints for Data 360 activation targets:

      | Operation | Path |
      | :--- | :--- |
      | [Get activation targets](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Activation-Targets/paths/~1ssot~1activation-targets/get) | `GET /ssot/activation-targets` |
      | [Create activation target](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Activation-Targets/paths/~1ssot~1activation-targets/post) | `POST /ssot/activation-targets` |
      | [Get activation target](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Activation-Targets/paths/~1ssot~1activation-targets~1%7BactivationTargetId%7D/get) | `GET /ssot/activation-targets/{activationTargetId}` |
      | [Update activation target](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Activation-Targets/paths/~1ssot~1activation-targets~1%7BactivationTargetId%7D/patch) | `PATCH /ssot/activation-targets/{activationTargetId}` |
  - name: Activations
    description: |
      Connect REST API endpoints for Data 360 activations:

      | Operation | Path |
      | :--- | :--- |
      | [Get activations](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Activations/paths/~1ssot~1activations/get) | `GET /ssot/activations` |
      | [Create activation](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Activations/paths/~1ssot~1activations/post) | `POST /ssot/activations` |
      | [Delete activation](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Activations/paths/~1ssot~1activations~1%7BactivationId%7D/delete) | `DELETE /ssot/activations/{activationId}` |
      | [Get activation](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Activations/paths/~1ssot~1activations~1%7BactivationId%7D/get) | `GET /ssot/activations/{activationId}` |
      | [Update activation](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Activations/paths/~1ssot~1activations~1%7BactivationId%7D/put) | `PUT /ssot/activations/{activationId}` |
      | [Publish a Batch DMO activation](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Activations/paths/~1ssot~1activations~1%7BactivationId%7D~1actions~1publish/post) | `GET /ssot/activations/{activationId}/actions/publish` |
      | [Get Audience DMO activation records](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Activations/paths/~1ssot~1activations~1%7BactivationId%7D~1data/get) | `GET /ssot/activations/{activationId}/data` |
      | [Get activation external platforms](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Activations/paths/~1ssot~1activation-external-platforms/get) | `GET /ssot/activation-external-platforms` |
  - name: Calculated Insights
    description: |
      Connect REST API endpoints for Data 360 calculated insights:

      | Operation | Path |
      | :--- | :--- |
      | [Get calculated insights](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Calculated-Insights/paths/~1ssot~1calculated-insights/get) | `GET /ssot/calculated-insights` |
      | [Create calculated insights](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Calculated-Insights/paths/~1ssot~1calculated-insights/post) | `POST /ssot/calculated-insights` |
      | [Delete calculated insight](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Calculated-Insights/paths/~1ssot~1calculated-insights~1%7BapiName%7D/delete) | `DELETE /ssot/calculated-insights/{apiName}` |
      | [Get calculated insight](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Calculated-Insights/paths/~1ssot~1calculated-insights~1%7BapiName%7D/get) | `GET /ssot/calculated-insights/{apiName}` |
      | [Update calculated insight](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Calculated-Insights/paths/~1ssot~1calculated-insights~1%7BapiName%7D/patch) | `PATCH /ssot/calculated-insights/{apiName}` |
      | [Run calculated insight](https://developer.salesforce.com/docs/data/connectapi/references/spec#tag/Calculated-Insights/paths/~1ssot~1calculated-insights~1%7BapiName%7D~1actions~1run/post) | `POST /ssot/calculated-insights/{apiName}/actions/run` |
