    CdpMlPredictInputBaseRepresentation:
      title: ML Predict Input Representation
      description: Represents prediction input.
      type: object
      properties:
        fieldNames:
          description: The names of the input fields that the model uses when making the prediction. The fields must be in the same order specified in the model artifact's `inputFields` parameter.
          type: array
          items:
            type: string
        rows:
          description: The set or sets of values of the fields listed in `fieldNames`. For example, if your `fieldNames` are `["State", "Industry", "ACV"]`, your value for `Rows` could be `[["Texas", "Aerospace", "3000000"],["Arizona", "Semiconductors", "5500000"]]`.
          type: array
          items:
            type: object
        model:
          description: |
            The model's name or ID, for example:
            ```json
            {
              "name": "titanic_simple"
            }
            ```
            or

            ```json
            {
              "id": "12lX40000000DAKIA2"
            }
            ```

            **Available Version:** 60.0
          type: object
        settings:
          description: |
            The model configuration settings used to generate the prediction.

            **Available Version:** 61.0
          type: object
          properties:
            aggregateFunctions:
              description: |
                Reserved for future use.

                **Available Version:** 61.0
              type: array
              items:
                type: string
            maxPrescriptions:
              description: |
                Maximum number of recommendations. The allowed range is `-1` through `200`, and the default value is `-1` (unlimited).

                **Available Version:** 61.0
              type: integer
            maxTopFactors:
              description: |
                Maximum top factor count. The allowed range is `0` through `3`, and the default value is `0`.

                **Available Version:** 61.0
              type: integer
            prescriptionImpactPercentage:
              description: |
                Indicates the minimum impact percentage of the prescriptions to return. Only prescriptions with a greater or equal impact percentage are returned. The allowed range is `0` through `100`, and the default value is `0`.

                **Available Version:** 61.0
              type: integer
        type:
          description: |
            Type of prediction.

            **Available Version:** 61.0
          enum:
            - RawData
          type: string
      required:
        - fieldNames
        - rows
        - model
        - type
