            **Available Version:** 63.0
          enum:
            - Bzip2
            - Gzip
            - None
          type: string
        outputDelimiter:
          description: |
            Field delimiter to use in output files.

            **Available Version:** 63.0
          enum:
            - BrokenPipe
            - Caret
            - Colon
            - Comma
            - Hash
            - Pipe
            - Semicolon
            - Slash
            - Tab
            - Tilde
            - Underscore
          type: string
        outputFormat:
          description: |
            Output format for the activation target.

            **Available Version:** 63.0
          type: string
