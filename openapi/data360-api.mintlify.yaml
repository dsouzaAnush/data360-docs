            **Available Version:** 63.0
          enum:
            - Activation
            - Segment
            - SegmentActivation
          type: string
      required:
        - filenameDateSuffixFormat
        - outputCompressionFormat
        - outputDelimiter
        - outputFormat
        - outputMaxFileSizeMegaBytes
